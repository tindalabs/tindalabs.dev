apiVersion: 1

datasources:
  - name: Scent DB
    type: postgres
    uid: scent-postgres
    access: proxy
    # Scent postgres is in a separate Docker Compose network. host.docker.internal
    # maps to the host machine, where postgres:5432 is exposed via docker-compose.
    # Requires extra_hosts: host.docker.internal:host-gateway on the Grafana service.
    url: host.docker.internal:5432
    database: scent
    user: scent
    secureJsonData:
      password: scent_dev
    jsonData:
      sslmode: disable
      postgresVersion: 1600
      timescaledb: false
    editable: false
